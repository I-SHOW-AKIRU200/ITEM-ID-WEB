<style>

.rare-BLUE { color: var(--rare-blue); background: rgba(77,166,255,0.1); }
.rare-GREEN { color: var(--rare-green); background: rgba(76,255,145,0.1); }
.rare-PURPLE { color: var(--rare-purple); background: rgba(192,132,252,0.1); }
.rare-PURPLE_PLUS { color: var(--rare-purple-plus); background: rgba(224,64,251,0.1); }
.rare-ORANGE { color: var(--rare-orange); background: rgba(255,152,0,0.1); }
.rare-ORANGE_PLUS { color: var(--rare-orange-plus); background: rgba(255,107,0,0.1); }
.rare-RED { color: var(--rare-red); background: rgba(255,68,68,0.1); }

.dot-NONE { background: var(--rare-none); }
.dot-WHITE { background: var(--rare-white); }
.dot-BLUE { background: var(--rare-blue); }
.dot-GREEN { background: var(--rare-green); }
.dot-PURPLE { background: var(--rare-purple); }
.dot-PURPLE_PLUS { background: var(--rare-purple-plus); }
.dot-ORANGE { background: var(--rare-orange); }
.dot-ORANGE_PLUS { background: var(--rare-orange-plus); }
.dot-RED { background: var(--rare-red); }

.bar-NONE { background: var(--rare-none); }
.bar-WHITE { background: var(--rare-white); }
.bar-BLUE { background: var(--rare-blue); box-shadow: 0 0 8px var(--rare-blue); }
.bar-GREEN { background: var(--rare-green); box-shadow: 0 0 8px var(--rare-green); }
.bar-PURPLE { background: var(--rare-purple); box-shadow: 0 0 8px var(--rare-purple); }
.bar-PURPLE_PLUS { background: var(--rare-purple-plus); box-shadow: 0 0 12px var(--rare-purple-plus); }
.bar-ORANGE { background: var(--rare-orange); box-shadow: 0 0 8px var(--rare-orange); }
.bar-ORANGE_PLUS { background: var(--rare-orange-plus); box-shadow: 0 0 12px var(--rare-orange-plus); }
.bar-RED { background: var(--rare-red); box-shadow: 0 0 12px var(--rare-red); }

@keyframes spin { to { transform: rotate(360deg); } }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: #000; }
::-webkit-scrollbar-thumb { background: var(--border2); }

@media (max-width: 560px) {
  main { padding: 10px 10px 20px; }
  .controls-row { grid-template-columns: 1fr; }
  .filter-btn-group { display: grid; grid-template-columns: repeat(3, 1fr); }
  .filter-btn { text-align: center; }
  .overlay-img { width: 150px; height: 150px; }
  .overlay-img-wrap { min-height: 170px; }
  .detail-row { grid-template-columns: 90px 1fr; }
  .ev-detail-row { grid-template-columns: 80px 1fr; }
  .tab-btn { padding: 10px 12px; font-size: 9px; letter-spacing: 0.12em; }
}

/* ── OVERLAY ACTION BUTTONS ── */
.overlay-actions {
  display: flex; gap: 8px; padding: 12px 20px 20px;
  border-top: 1px solid var(--border);
}
.overlay-action-btn {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px;
  background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text-dim); font-family: 'Orbitron', monospace;
  font-size: 9px; font-weight: 700; letter-spacing: 0.15em;
  padding: 10px 0; cursor: pointer; transition: all 0.2s;
  text-transform: uppercase;
}
.overlay-action-btn:hover { border-color: var(--accent); color: var(--accent); }
.overlay-action-btn.copied { border-color: #4cff91; color: #4cff91; }

/* ── HEADER TITLE ROW ── */
.header-title-row {
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.settings-icon-btn {
  position: absolute; right: 0;
  background: transparent; border: 1px solid var(--border2);
  color: var(--text-dim); width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s; border-radius: 0;
}
.settings-icon-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── SETTINGS BACKDROP ── */
.settings-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px); z-index: 600;
  opacity: 0; pointer-events: none; transition: opacity 0.28s;
}
.settings-backdrop.open { opacity: 1; pointer-events: all; }

/* ── SETTINGS BOTTOM SHEET ── */
.settings-sheet {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 700;
  background: var(--surface); border-top: 1px solid var(--border2);
  padding: 12px 24px 40px;
  transform: translateY(100%); transition: transform 0.32s cubic-bezier(0.22,1,0.36,1);
  max-height: 85vh; overflow-y: auto;
}
.settings-sheet.open { transform: translateY(0); }

.settings-handle {
  width: 40px; height: 3px; background: var(--border2);
  border-radius: 2px; margin: 0 auto 18px; 
}
.settings-title {
  font-family: 'Orbitron', monospace; font-size: 11px; font-weight: 700;
  letter-spacing: 0.25em; color: var(--accent); margin-bottom: 20px;
  text-align: center;
}

/* ── SETTINGS ITEM ROW ── */
.settings-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 0; border-bottom: 1px solid var(--border);
}
.settings-item-label {
  font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 600;
  color: var(--text); letter-spacing: 0.05em;
}
.settings-item-sub {
  font-family: 'Share Tech Mono', monospace; font-size: 10px;
  color: var(--text-muted); letter-spacing: 0.04em; margin-top: 3px;
}

/* ── TOGGLE BUTTON ── */
.toggle-btn {
  width: 46px; height: 26px; border-radius: 13px;
  background: var(--surface3); border: 1px solid var(--border2);
  position: relative; cursor: pointer; transition: background 0.25s, border-color 0.25s;
  flex-shrink: 0;
}
.toggle-btn.on { background: var(--accent); border-color: var(--accent); }
.toggle-knob {
  position: absolute; top: 3px; left: 3px;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--text-muted); transition: transform 0.25s, background 0.25s;
}
.toggle-btn.on .toggle-knob { transform: translateX(20px); background: #000; }

/* ── SETTINGS DIVIDER ── */
.settings-divider { height: 1px; background: var(--border); margin: 18px 0 14px; }

/* ── OWNER SECTION ── */
.settings-owner-label {
  font-family: 'Orbitron', monospace; font-size: 9px; letter-spacing: 0.2em;
  color: var(--text-muted); margin-bottom: 14px;
}
.settings-owner-links { display: flex; gap: 14px; align-items: center; }
.settings-owner-link {
  display: flex; align-items: center; justify-content: center;
  width: 44px; height: 44px; border: 1px solid var(--border2);
  color: var(--text-dim); background: var(--surface2);
  text-decoration: none; transition: all 0.2s;
}
.settings-owner-link:hover { border-color: var(--accent); color: var(--accent); }

/* ── DEV MODE TOAST ── */
.dev-toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--accent); color: #000;
  font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 0.08em;
  padding: 9px 18px; z-index: 800;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  white-space: nowrap;
}
.dev-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── DEV MODE card indicator ── */
body.dev-mode .item-card { cursor: crosshair; }
body.dev-mode .item-card .card-overlay-hint span::before { content: 'COPY ID · '; }

/* ── LIGHT THEME ── */
body.light-theme {

<script>
// ═══════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════
const ITEMS_PER_PAGE = 80;
const CDN = id => `https://cdn.jsdelivr.net/gh/ShahGCreator/icon@main/PNG/${id}.png`;
const EVENTS_API = region => `https://raw.githubusercontent.com/KillerSharmaBot/Event/main/data/event_${region.toLowerCase()}.json`;

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let allItems = [];
let filteredItems = [];
let currentPage = 1;
let totalPages = 1;
let activePanels = { type: false, rare: false, tag: false };
let currentTab = 'items';

let eventsData = null;      // raw fetched data
let eventsRegion = 'IND';
let eventsCache = {};       // region -> data

// ═══════════════════════════════════════════════════
//  TAB SWITCH
// ═══════════════════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabItems').classList.toggle('active', tab === 'items');
  document.getElementById('tabEvents').classList.toggle('active', tab === 'events');

  document.getElementById('itemsControls').classList.toggle('visible', tab === 'items');
  document.getElementById('filterPanelsWrap').style.display = tab === 'items' ? '' : 'none';
  document.getElementById('itemsSection').classList.toggle('visible', tab === 'items');
  document.getElementById('eventsSection').classList.toggle('visible', tab === 'events');

  if (tab === 'events' && !eventsData) loadEvents();

  // Update URL
  const p = new URLSearchParams(window.location.search);
  if (tab === 'events') p.set('tab', 'events'); else p.delete('tab');
  history.replaceState(null, '', p.toString() ? location.pathname + '?' + p.toString() : location.pathname);
}

// ═══════════════════════════════════════════════════
//  URL PARAMS
// ═══════════════════════════════════════════════════
function getParams() { return new URLSearchParams(window.location.search); }

function pushURL() {
  const params = new URLSearchParams();
  const q = document.getElementById('searchInput').value.trim();
  const typeF = document.getElementById('selectType').value;
  const rareF = document.getElementById('selectRare').value;
  const tagF = document.getElementById('selectTag').value;
  if (q) params.set('q', q);
  if (typeF) params.set('type', typeF);
  if (rareF) params.set('rare', rareF);
  if (tagF) params.set('tag', tagF);
  if (currentPage > 1) params.set('page', currentPage);
  if (currentTab === 'events') params.set('tab', 'events');
  const qs = params.toString();
  history.replaceState(null, '', qs ? (location.pathname + '?' + qs) : location.pathname);
}

function readURLIntoUI() {
  const p = getParams();
  if (p.get('q')) document.getElementById('searchInput').value = p.get('q');
  if (p.get('type')) document.getElementById('selectType').value = p.get('type');
  if (p.get('rare')) document.getElementById('selectRare').value = p.get('rare');
  if (p.get('tag')) document.getElementById('selectTag').value = p.get('tag');
  if (p.get('page')) currentPage = Math.max(1, parseInt(p.get('page')) || 1);
  if (p.get('region')) document.getElementById('regionSelect').value = p.get('region');
}

function applyFiltersFromState() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const typeF = document.getElementById('selectType').value;
  const rareF = document.getElementById('selectRare').value;
  const tagF = document.getElementById('selectTag').value;
  filteredItems = allItems.filter(item => {
    if (typeF && (item.type || '').toLowerCase() !== typeF.toLowerCase()) return false;
    if (rareF && (item.Rare || '').toLowerCase() !== rareF.toLowerCase()) return false;
    if (tagF && (item.tag || '').toLowerCase() !== tagF.toLowerCase()) return false;
    if (q) {
      const inId = String(item.itemID).includes(q);
      const inName = (item.name || '').toLowerCase().includes(q);
      const inIcon = (item.icon || '').toLowerCase().includes(q);
      if (!inId && !inName && !inIcon) return false;
    }
    return true;
  });
}

// ═══════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════
async function init() {
  try {
    updateLoader(10, 'FETCHING DATA...');
    const res = await fetch('./Upto-ob53-item-data.json');
    if (!res.ok) throw new Error('Failed to load JSON');
    updateLoader(60, 'PARSING ITEMS...');
    const raw = await res.json();
    updateLoader(80, 'PROCESSING...');
    allItems = raw.filter(i => i.itemID);
    buildTypeOptions();
    buildTagOptions();
    readURLIntoUI();
    applyFiltersFromState();
    updateLoader(100, 'READY');
    await delay(300);
    showApp();

    // Handle ?tab=events
    if (getParams().get('tab') === 'events') {
      switchTab('events');
    } else {
      renderPage();
      // Handle ?item=ID
      const itemId = getParams().get('item');
      if (itemId) {
        const found = allItems.find(i => String(i.itemID) === String(itemId));
        if (found) {
          const idx = filteredItems.findIndex(i => String(i.itemID) === String(itemId));
          if (idx >= 0) { currentPage = Math.floor(idx / ITEMS_PER_PAGE) + 1; renderPage(); }
          openOverlay(found);
        }
      }
    }
  } catch(e) {
    document.getElementById('loadingText').textContent = 'ERROR: ' + e.message + ' — Place Upto-ob53-item-data.json in the same folder.';
  }
}

function updateLoader(pct, text) {
  document.getElementById('loadingBar').style.width = pct + '%';
  document.getElementById('loadingText').textContent = text;
}

function showApp() {
  document.getElementById('loadingScreen').classList.add('hidden');
  document.getElementById('siteHeader').style.display = '';
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// ═══════════════════════════════════════════════════
//  ITEMS OPTIONS
// ═══════════════════════════════════════════════════
function buildTypeOptions() {
  const types = [...new Set(allItems.map(i => i.type).filter(t => t && t.trim()))].sort();
  const sel = document.getElementById('selectType');
  types.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; sel.appendChild(o); });
}
function buildTagOptions() {
  const tags = [...new Set(allItems.map(i => i.tag).filter(t => t && t.trim()))].sort();
  const sel = document.getElementById('selectTag');
  tags.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; sel.appendChild(o); });
}

// ═══════════════════════════════════════════════════
//  ITEMS FILTERS
// ═══════════════════════════════════════════════════
let searchTimeout = null;
document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(applyFilters, 180);
});

function applyFilters() {
  applyFiltersFromState();
  currentPage = 1;
  renderPage();
  pushURL();
}

function togglePanel(key) {
  const panels = { type: 'panelType', rare: 'panelRare', tag: 'panelTag' };
  const btns = { type: 'btnFilterType', rare: 'btnFilterRare', tag: 'btnFilterTag' };
  Object.keys(panels).forEach(k => {
    if (k !== key) {
      document.getElementById(panels[k]).classList.remove('open');
      document.getElementById(btns[k]).classList.remove('active');
      activePanels[k] = false;
    }
  });
  activePanels[key] = !activePanels[key];
  document.getElementById(panels[key]).classList.toggle('open', activePanels[key]);
  document.getElementById(btns[key]).classList.toggle('active', activePanels[key]);
}

function clearFilter(key) {
  if (key === 'type') document.getElementById('selectType').value = '';
  if (key === 'rare') document.getElementById('selectRare').value = '';
  if (key === 'tag') document.getElementById('selectTag').value = '';
  togglePanel(key);
  applyFilters();
}

// ═══════════════════════════════════════════════════
//  ITEMS RENDER
// ═══════════════════════════════════════════════════
function renderPage() {
  totalPages = Math.max(1, Math.ceil(filteredItems.length / ITEMS_PER_PAGE));
  if (currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage - 1) * ITEMS_PER_PAGE;
  const pageItems = filteredItems.slice(start, start + ITEMS_PER_PAGE);
  renderGrid(pageItems);
  renderPagination();
  updateStats();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderGrid(items) {
  const grid = document.getElementById('itemsGrid');
  grid.innerHTML = '';
  if (!items.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-state-title">NO ITEMS FOUND</div><div class="empty-state-sub">Try adjusting your search or filters</div></div>`;
    return;
  }
  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'item-card';
    card.onclick = () => {
      if (isDevMode) {
        navigator.clipboard.writeText(String(item.itemID)).then(() => {
          showDevToast('COPIED: ' + item.itemID);
        }).catch(() => {
          showDevToast('COPY FAILED');
        });
      } else {
        openOverlay(item);
      }
    };
    const rare = (item.Rare || 'NONE').replace(/[^A-Z_]/g, '');
    card.innerHTML = `
      <div class="item-img-placeholder" id="ph-${item.itemID}"><div class="placeholder-icon"></div></div>
      <div class="card-rare-dot dot-${rare}"></div>
      <div class="card-overlay-hint"><span>View Details</span></div>`;
    grid.appendChild(card);
    const img = new Image();
    img.onload = () => {
      const ph = document.getElementById(`ph-${item.itemID}`);
      if (ph) { const el = document.createElement('img'); el.className = 'item-img'; el.src = img.src; el.alt = item.name || ''; ph.replaceWith(el); }
    };
    img.src = CDN(item.itemID);
  });
}

function updateStats() {
  document.getElementById('statsCount').textContent = filteredItems.length.toLocaleString();
  document.getElementById('statsPage').textContent = totalPages > 1 ? `— Page ${currentPage} of ${totalPages}` : '';
}

function renderPagination() {
  const pag = document.getElementById('pagination');
  pag.innerHTML = '';
  if (totalPages <= 1) return;

  const prev = document.createElement('button');
  prev.className = 'page-nav-btn'; prev.textContent = 'PREV'; prev.disabled = currentPage === 1;
  prev.onclick = () => goPage(currentPage - 1);
  pag.appendChild(prev);

  buildPageRange(currentPage, totalPages).forEach(p => {
    const btn = document.createElement('button');
    if (p === '...') { btn.className = 'page-btn ellipsis'; btn.textContent = '...'; }
    else { btn.className = 'page-btn' + (p === currentPage ? ' active' : ''); btn.textContent = p; btn.onclick = () => goPage(p); }
    pag.appendChild(btn);
  });

  const next = document.createElement('button');
  next.className = 'page-nav-btn'; next.textContent = 'NEXT'; next.disabled = currentPage === totalPages;
  next.onclick = () => goPage(currentPage + 1);
  pag.appendChild(next);
}

function buildPageRange(cur, total) {
  if (total <= 9) return Array.from({ length: total }, (_, i) => i + 1);
  const range = [], d = 2;
  for (let i = 1; i <= total; i++) if (i === 1 || i === total || (i >= cur - d && i <= cur + d)) range.push(i);
  const out = [];
  for (let i = 0; i < range.length; i++) { if (i > 0 && range[i] - range[i-1] > 1) out.push('...'); out.push(range[i]); }
  return out;
}

function goPage(p) {
  if (p < 1 || p > totalPages) return;
  currentPage = p; renderPage(); pushURL();
}

let currentOverlayItem = null;

// ═══════════════════════════════════════════════════
//  ITEMS OVERLAY
// ═══════════════════════════════════════════════════
function openOverlay(item) {
  currentOverlayItem = item;
  const overlay = document.getElementById('overlay');
  const img = document.getElementById('overlayImg');
  const loader = document.getElementById('overlayLoader');
  const rareBar = document.getElementById('overlayRareBar');
  const details = document.getElementById('overlayDetails');

  img.style.display = 'none'; loader.style.display = 'block'; img.src = '';
  const rare = (item.Rare || 'NONE').replace(/[^A-Z_]/g, '');
  rareBar.className = `overlay-rare-bar bar-${rare}`;

  const t = new Image();
  t.onload = () => { img.src = t.src; img.style.display = 'block'; loader.style.display = 'none'; };
  t.onerror = () => { loader.style.display = 'none'; };
  t.src = CDN(item.itemID);

  const fields = [
    { key: 'Item ID', val: item.itemID, cls: 'mono' },
    { key: 'Name', val: item.name },
    { key: 'Icon Name', val: item.icon, cls: 'mono' },
    { key: 'Type', val: item.type },
    { key: 'Item Type', val: item.itemType },
    { key: 'Rarity', val: item.Rare, rare: true },
    { key: 'Tag', val: item.tag, cls: 'mono' },
    { key: 'Collection', val: (item.collectionType && item.collectionType !== 'NONE') ? item.collectionType : null },
    { key: 'Unique', val: item.isUnique === true ? 'YES' : item.isUnique === false ? 'NO' : null },
    { key: 'Description', val: item.description, cls: 'description' },
  ];

  details.innerHTML = '';
  fields.forEach(f => {
    const v = f.val;
    if (v === null || v === undefined || v === '' || v === 'undefined') return;
    const row = document.createElement('div'); row.className = 'detail-row';
    const key = document.createElement('div'); key.className = 'detail-key'; key.textContent = f.key;
    const val = document.createElement('div'); val.className = 'detail-val' + (f.cls ? ' ' + f.cls : '');
    if (f.rare) {
      const badge = document.createElement('span');
      badge.className = `rare-badge rare-${rare}`; badge.textContent = v; val.appendChild(badge);
    } else { val.textContent = v; }
    row.appendChild(key); row.appendChild(val); details.appendChild(row);
  });

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  const itemParams = new URLSearchParams(window.location.search);
  itemParams.set('item', item.itemID);
  history.replaceState(null, '', location.pathname + '?' + itemParams.toString());
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
  currentOverlayItem = null;
  const p = new URLSearchParams(window.location.search);
  p.delete('item');
  history.replaceState(null, '', p.toString() ? location.pathname + '?' + p.toString() : location.pathname);
}

function copyOverlayItemId() {
  if (!currentOverlayItem) return;
  const btn = document.getElementById('copyIdBtn');
  navigator.clipboard.writeText(String(currentOverlayItem.itemID)).then(() => {
    btn.classList.add('copied');
    const orig = btn.innerHTML;
    btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> COPIED!`;
    setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = orig; }, 1800);
  }).catch(() => showDevToast('COPY FAILED'));
}

function shareOverlayItem() {
  if (!currentOverlayItem) return;
  const params = new URLSearchParams(window.location.search);
  params.set('item', currentOverlayItem.itemID);
  const url = location.origin + location.pathname + '?' + params.toString();
  if (navigator.share) {
    navigator.share({ title: currentOverlayItem.name || 'Item', text: 'Item ID: ' + currentOverlayItem.itemID, url });
  } else {
    navigator.clipboard.writeText(url).then(() => showDevToast('LINK COPIED!')).catch(() => showDevToast('COPY FAILED'));
  }
}

// ═══════════════════════════════════════════════════
//  EVENTS
// ═══════════════════════════════════════════════════
async function loadEvents() {
  const region = document.getElementById('regionSelect').value;
  eventsRegion = region;
  const body = document.getElementById('eventsBody');

  // Use cache if available
  if (eventsCache[region]) {
    eventsData = eventsCache[region];
    renderEvents();
    return;
  }

  body.innerHTML = `<div class="events-loading"><div class="events-spinner"></div>LOADING ${region} EVENTS...</div>`;

  try {
    const res = await fetch(EVENTS_API(region));
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    eventsCache[region] = data;
    eventsData = data;
    renderEvents();
  } catch(e) {
    body.innerHTML = `<div class="events-error">Failed to load events for ${region}.<br>Check your connection or try a different region.</div>`;
  }
}

function renderEvents() {
  if (!eventsData) return;
  const body = document.getElementById('eventsBody');
  const q = (document.getElementById('eventsSearch').value || '').trim().toLowerCase();
  const now = Math.floor(Date.now() / 1000);

  const updates = (eventsData.updates && eventsData.updates.items) || [];
  const events = (eventsData.events && eventsData.events.items) || [];

  function filterItems(arr) {
    if (!q) return arr;
    return arr.filter(e => (e.Title || '').toLowerCase().includes(q));
  }

  const filteredUpdates = filterItems(updates);
  const filteredEvents = filterItems(events);

  if (!filteredUpdates.length && !filteredEvents.length) {
    body.innerHTML = `<div class="events-loading" style="color:var(--text-muted)">NO EVENTS FOUND</div>`;
    return;
  }

  body.innerHTML = '';

  if (filteredUpdates.length) {
    const label = document.createElement('div');
    label.className = 'events-section-label';
    label.innerHTML = `<span></span> UPDATES`;
    body.appendChild(label);
    const list = document.createElement('div');
    list.className = 'events-list';
    filteredUpdates.forEach(ev => list.appendChild(buildEventCard(ev, now)));
    body.appendChild(list);
  }

  if (filteredEvents.length) {
    const label = document.createElement('div');
    label.className = 'events-section-label';
    label.innerHTML = `<span></span> EVENTS`;
    body.appendChild(label);
    const list = document.createElement('div');
    list.className = 'events-list';
    filteredEvents.forEach(ev => list.appendChild(buildEventCard(ev, now)));
    body.appendChild(list);
  }
}

function buildEventCard(ev, now) {
  const card = document.createElement('div');
  card.className = 'event-card';
  card.onclick = () => openEvOverlay(ev);

  const start = parseInt(ev.Start) || 0;
  const end = parseInt(ev.End) || 0;
  const isLive = now >= start && now <= end;

  let timeHtml = '';
  if (isLive) {
    timeHtml = `<span class="event-time-badge"><span class="event-live-dot"></span>LIVE</span>`;
  } else if (now < start) {
    timeHtml = `<span class="event-time-badge">UPCOMING</span>`;
  } else {
    timeHtml = `<span class="event-time-badge">ENDED</span>`;
  }

  let bannerHtml = '';
  if (ev.Banner) {
    bannerHtml = `<div class="event-banner-wrap">
      <img class="event-banner" src="${escHtml(ev.Banner)}" alt="${escHtml(ev.Title || '')}" loading="lazy" />
    </div>`;
  } else {
    bannerHtml = `<div class="event-banner-wrap">
      <img class="event-banner event-banner-placeholder-img" src="https://raw.githubusercontent.com/I-SHOW-AKIRU200/ITEM-ID-WEB/main/images/1775308720829.png" alt="No Banner" loading="lazy" />
    </div>`;
  }

  card.innerHTML = `${bannerHtml}
    <div class="event-footer">
      <div class="event-title">${escHtml(ev.Title || 'Untitled Event')}</div>
      ${timeHtml}
    </div>`;

  return card;
}

// ═══════════════════════════════════════════════════
//  EVENT OVERLAY
// ═══════════════════════════════════════════════════
function openEvOverlay(ev) {
  const overlay = document.getElementById('evOverlay');
  const banner = document.getElementById('evOverlayBanner');
  const body = document.getElementById('evOverlayBody');
  const bannerWrap = document.getElementById('evOverlayBannerWrap');

  if (ev.Banner) {
    banner.src = ev.Banner;
    banner.style.display = 'block';
    bannerWrap.style.display = '';
  } else {
    banner.style.display = 'none';
    bannerWrap.style.display = 'none';
  }

  const now = Math.floor(Date.now() / 1000);
  const start = parseInt(ev.Start) || 0;
  const end = parseInt(ev.End) || 0;
  const isLive = now >= start && now <= end;
  const isUpcoming = now < start;

  let statusHtml = '';
  if (isLive) statusHtml = `<span class="ev-status-active"><span class="event-live-dot"></span> LIVE</span>`;
  else if (isUpcoming) statusHtml = `<span class="ev-status-upcoming">UPCOMING</span>`;
  else statusHtml = `<span class="ev-status-ended">ENDED</span>`;

  const fields = [];

  if (ev.Title) fields.push({ key: 'Title', val: ev.Title });
  fields.push({ key: 'Status', val: statusHtml, raw: true });
  if (start) fields.push({ key: 'Start', val: formatTs(start), cls: 'mono' });
  if (end && end < 4000000000) fields.push({ key: 'End', val: formatTs(end), cls: 'mono' });
  if (ev.Details) fields.push({ key: 'Details', val: ev.Details, cls: 'desc' });

  // Link field — skip internal V2_ links
  const link = ev.Link || ev.LinkAlt;
  if (link && link.startsWith('http')) {
    fields.push({ key: 'Link', val: link, isLink: true });
  }

  body.innerHTML = '';
  fields.forEach(f => {
    const row = document.createElement('div'); row.className = 'ev-detail-row';
    const key = document.createElement('div'); key.className = 'ev-detail-key'; key.textContent = f.key;
    const val = document.createElement('div');
    if (f.isLink) {
      val.className = 'ev-detail-val';
      const a = document.createElement('a');
      a.href = f.val; a.target = '_blank'; a.rel = 'noopener';
      a.className = 'ev-detail-val link-val';
      a.textContent = f.val;
      val.appendChild(a);
    } else if (f.raw) {
      val.className = 'ev-detail-val';
      val.innerHTML = f.val;
    } else {
      val.className = 'ev-detail-val' + (f.cls ? ' ' + f.cls : '');
      val.textContent = f.val;
    }
    row.appendChild(key); row.appendChild(val); body.appendChild(row);
  });

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeEvOverlay() {
  document.getElementById('evOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ═══════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════
function formatTs(ts) {
  const d = new Date(ts * 1000);
  return d.toLocaleString('en-GB', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false });
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Keyboard close
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeOverlay(); closeEvOverlay(); }
});

// ═══════════════════════════════════════════════════
//  SETTINGS
// ═══════════════════════════════════════════════════
let isLightTheme = false;
let isDevMode = false;

function openSettings() {
  document.getElementById('settingsSheet').classList.add('open');
  document.getElementById('settingsBackdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeSettings() {
  document.getElementById('settingsSheet').classList.remove('open');
  document.getElementById('settingsBackdrop').classList.remove('open');
  document.body.style.overflow = '';
}

function toggleTheme() {
  isLightTheme = !isLightTheme;
  document.body.classList.toggle('light-theme', isLightTheme);
  document.getElementById('themeToggle').classList.toggle('on', isLightTheme);
}

function toggleDevMode() {
  isDevMode = !isDevMode;
  document.body.classList.toggle('dev-mode', isDevMode);
  document.getElementById('devToggle').classList.toggle('on', isDevMode);
  showDevToast(isDevMode ? 'DEVELOPER MODE ON' : 'DEVELOPER MODE OFF');
}

function showDevToast(msg) {
  const t = document.getElementById('devToast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2000);
}

//  START
// ═══════════════════════════════════════════════════
init();
